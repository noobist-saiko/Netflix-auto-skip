<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Netflix Auto Skip</title>
  <style>
    body { font-family: Arial, sans-serif; width: 220px; padding: 10px; }
    h3 { margin-top: 0; }
    label { display: block; margin: 8px 0; }
    input[type="checkbox"] { margin-right: 6px; }
  </style>
</head>
<body>
  <h3>Auto Skip Settings</h3>
  <label><input type="checkbox" id="enableToggle">Enable Auto Skip</label>
  <label><input type="checkbox" id="skipIntroToggle">Skip Intro</label>
  <label><input type="checkbox" id="nextEpisodeToggle">Next Episode</label>
  <label>Video Speed: <input type="number" id="speedInput" min="0.5" max="3" step="0.1" value="1">x</label>

  <script src="popup.js"></script>
</body>
</html>
